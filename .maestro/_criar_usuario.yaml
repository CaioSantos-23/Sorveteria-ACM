appId: host.exp.exponent
---
- openLink: exp://127.0.0.1:8081

- extendedWaitUntil:
    visible:
      id: "btn-criar-conta"
    timeout: 30000

- waitForAnimationToEnd

- runScript:
    file: delay_5s.js

- tapOn:
    id: "btn-criar-conta"

# Se ainda estiver na tela de login (tap não registrou), espera e tenta de novo
- runFlow:
    when:
      visible:
        id: "btn-criar-conta"
    commands:
      - runScript:
          file: delay_5s.js
      - tapOn:
          id: "btn-criar-conta"

- extendedWaitUntil:
    visible:
      id: "titulo-cadastro"
    timeout: 60000

- tapOn:
    id: "input-nome"
- inputText: "Usuario Teste"

- tapOn:
    id: "input-email"
- inputText: "usuario@teste.com"

- tapOn:
    id: "input-senha"
- inputText: "senha123"

- hideKeyboard

- tapOn:
    id: "input-confirmar"
- inputText: "senha123"

- tapOn:
    text: "Criar conta"

- assertVisible:
    text: "Conta criada!"
- runFlow:
    when:
      visible:
        text: "Agora não"
    commands:
      - tapOn:
          text: "Agora não"
- runFlow:
    when:
      visible:
        text: "OK"
    commands:
      - tapOn:
          text: "OK"

- tapOn:
    id: "input-email-login"
- inputText: "usuario@teste.com"

- hideKeyboard

- tapOn:
    id: "input-senha-login"
- inputText: "senha123"

- tapOn:
    text: "Entrar"

- runFlow:
    when:
      visible:
        text: "Nunca"
    commands:
      - tapOn:
          text: "Nunca"
- runFlow:
    when:
      visible:
        text: "Never"
    commands:
      - tapOn:
          text: "Never"
